on:
  schedule:
  - cron: '0 4 * * *'
  workflow_dispatch:
permissions:
  packages: write
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: redhat-actions/podman-login@v1
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - env:
        SIGSTORE_PRIVATE: ${{ secrets.SIGSTORE_PRIVATE }}
        SECURE_BOOT_KEY: ${{ secrets.SECURE_BOOT_KEY }}
      run: |
        set -euxo pipefail
        ./setup.sh
        ./update.sh
